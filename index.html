<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jan Kowalski – Wizytówka</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #16213e;
      color: #eee;
      border-radius: 16px;
      padding: 48px 56px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border-top: 4px solid #0f3460;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      background: rgba(15, 52, 96, 0.3);
      border-radius: 50%;
    }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f3460, #533483);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .role {
      color: #7ec8e3;
      font-size: 0.95rem;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid #0f3460;
      margin: 24px 0;
    }

    .contact a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .contact a:hover { color: #7ec8e3; }

    .contact svg {
      flex-shrink: 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">JK</div>
    <h1>Jan Kowalski</h1>
    <p class="role">Programista</p>
    <hr class="divider">
    <div class="contact">
      <a href="mailto:jan.kowalski@example.com">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        jan.kowalski@example.com
      </a>
    </div>
  </div>
</body>
</html>
